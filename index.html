<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title id="pageTitle">Manat Pay</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="//libtl.com/sdk.js" data-zone="10701408" data-sdk="show_10701408"></script>
<style>
/* --- RƏNG DƏYİŞƏNLƏRİ (VARS) - MANAT PAY TEMA --- */
:root {
  /* LIGHT TEMA (Ağ/Yaşıl) - Default */
  --bg-start: #e8f5e9; 
  --bg-end: #ffffff;   
  --card-bg: rgba(255, 255, 255, 0.9); 
  --card-border: rgba(46, 204, 113, 0.2);
  --text-light: #ffffff;
  --text-dark: #1b2621;
  --accent: #27ae60; 
  --menu-bg: rgba(255, 255, 255, 0.85);
  --progress-bg: rgba(39, 174, 96, 0.15);
  --input-text: #1b2621; 

  /* Yaşıl Gradientlər */
  --btn-gradient-start: #2ecc71; 
  --btn-gradient-end: #27ae60;   
  --btn-shadow: rgba(46, 204, 113, 0.4); 
  --secondary-btn-gradient-start: #f39c12; 
  --secondary-btn-gradient-end: #e67e22; 
  
  /* Bildiriş rəngləri */
  --notification-bg: #27ae60; 
  --notification-text: #ffffff; 
}

/* DARK TEMA (Qara/Yaşıl) */
body.dark-theme {
  --bg-start: #0f1a15; 
  --bg-end: #1a2520;   
  --card-bg: rgba(30, 40, 35, 0.95); 
  --card-border: rgba(46, 204, 113, 0.15);
  --text-light: #ffffff;
  --text-dark: #f0f5f2;
  --accent: #2ecc71; 
  --menu-bg: rgba(15, 26, 21, 0.9);
  --progress-bg: rgba(255, 255, 255, 0.1);
  --input-text: #ffffff; 
  --notification-bg: #2ecc71; 
}

/* --- ÜMUMİ STİLLƏR --- */
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,var(--bg-start),var(--bg-end));
  background-size:400% 400%;
  animation:bgMove 15s ease infinite;
  color:var(--text-dark);
  min-height:100vh;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition: background-color 0.5s, color 0.5s; 
  padding-bottom: 80px; 
}
@keyframes bgMove{
  0%{background-position:0% 50;}
  50%{background-position:100% 50;}
  100%{background-position:0% 50;}
}

/* Düzəliş: Bütün səhifəni tam ekran rejimi üçün aşağı çəkdik */
.container{
    max-width:480px;
    margin:auto;
    padding:20px;
    padding-top:45px; 
} 

/* DİL VƏ TEMA SEÇİMİ */
.top-controls {
    display: flex;
    justify-content: flex-end; 
    align-items: center;
    margin-bottom: 25px; /* Düymələri bir az daha aşağı saldıq */
    position: relative;
    z-index: 50;
}

.right-controls {
    display: flex;
    gap: 10px; 
    align-items: center;
}

.lang-switcher-container {
    position: relative;
}
.lang-current-btn, .theme-toggle-btn {
    padding: 6px 10px;
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    color: var(--text-dark);
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    display: flex;
    align-items: center;
    height: 40px; 
    position: relative;
    z-index: 10;
}

/* Düzəliş: Klik xətasının qarşısını almaq üçün içindəki span-ların kliklənməsini ləğv etdik */
.lang-current-btn span, .theme-toggle-btn span { 
    pointer-events: none; 
}
.lang-current-btn span:first-child { margin-right: 5px; }

.lang-current-btn:hover, .theme-toggle-btn:hover {
    box-shadow: 0 4px 15px var(--btn-shadow);
}
.theme-icon { font-size: 20px; }

.lang-dropdown {
    position: absolute;
    top: 100%; 
    right: 0;
    margin-top: 5px;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    overflow: hidden;
    z-index: 10;
    min-width: 60px;
    display: none;
    backdrop-filter: blur(8px);
    border: 1px solid var(--card-border);
}
.lang-dropdown.show { display: block; }
.lang-dropdown button {
    width: 100%;
    padding: 8px 15px;
    border: none;
    background: none;
    color: var(--text-dark);
    font-weight: 600;
    text-align: center; 
    cursor: pointer;
    transition: background 0.2s;
    display: block; 
}
.lang-dropdown button:hover, .lang-dropdown button.active {
    background: var(--accent);
    color: var(--text-light);
}

.page{display:none;animation:fadeIn .4s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* Balans və Kart Dizaynı */
.balance-card, .ad-card, .task-card{
  background:var(--card-bg);
  border-radius:25px;
  padding:25px 20px;
  margin-bottom:20px;
  box-shadow:0 12px 30px rgba(0,0,0,0.1);
  backdrop-filter:blur(14px);
  text-align:center;
  border:1px solid var(--card-border);
  transition: background-color 0.5s, box-shadow 0.5s;
}
.balance-card h3{font-size:16px;color:var(--accent);margin-bottom:8px;letter-spacing:0.5px; font-weight: 800;}
.balance-card .amount{font-size:36px;font-weight:800;margin-top:5px;color:var(--text-dark);text-shadow:0 2px 10px rgba(0,0,0,0.05);}
.balance-card .usd{font-size:14px;color:var(--text-dark);opacity:0.7;margin-top:4px; font-weight: 600;}

/* Metod Siyahısı */
.method-list{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:12px 0;
    justify-content:space-around;
}
.method{
    flex:1 1 calc(50% - 5px); 
    padding:14px;
    border-radius:16px;
    background:linear-gradient(135deg,var(--btn-gradient-start),var(--btn-gradient-end)); 
    color:var(--text-light);
    text-align:center;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
    display:flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100px;
    position: relative;
    overflow: hidden; 
}
.method:hover{transform:scale(1.03);box-shadow:0 6px 15px rgba(46, 204, 113, 0.3);}
.method-logo{
    width: 45px;       
    height: 45px;      
    margin-bottom: 8px;
    border-radius: 10px; 
    object-fit: contain; 
    background-color: #fff;
    padding: 4px; 
    flex-shrink: 0; 
}
.method-logo.bank-logo { border-radius: 8px; padding: 2px; }
.method-text { font-size: 14px; }
.min-withdraw-label {
    position: absolute;
    bottom: 5px;
    right: 5px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    background: rgba(0, 0, 0, 0.3);
    padding: 2px 6px;
    border-radius: 6px;
}

.ad-card{margin-bottom:12px; padding: 20px;}
.ad-card h2{font-size:18px;color:var(--text-dark);margin-bottom:6px; font-weight: 800;}
.ad-card p{margin:4px 0;color:var(--text-dark);font-size:13px; font-weight: 600;}
.task-card{margin-bottom:10px;}
.task-card h2{font-size:18px;color:var(--text-dark);margin-bottom:8px; font-weight: 800;}
.task-card p{margin:6px 0;color:var(--text-dark);font-size:14px; font-weight: 600;}
.task-card button{
    width:100%;margin-top:12px;padding:12px;font-size:14px;font-weight:700;border:none;border-radius:14px;
    background:linear-gradient(90deg,var(--secondary-btn-gradient-start),var(--secondary-btn-gradient-end)); 
    color:var(--text-light);cursor:pointer;transition:0.3s;
}
.task-card button:hover{transform:scale(1.02);box-shadow:0 6px 15px rgba(243, 156, 18, 0.4);}
.task-card button.completed{background:gray !important;box-shadow:none !important;cursor:not-allowed !important;pointer-events:none !important;opacity:0.6;}
.task-card button.waiting {background: #f1c40f !important; cursor: wait !important; opacity: 0.9;}

.stats{display:flex;justify-content:space-around;margin-top:15px;}
.stat{background:var(--progress-bg);border-radius:12px;padding:12px 18px; flex: 1; margin: 0 5px;}
.stat span{display:block;font-size:18px;font-weight:800;color:var(--text-dark);}
.stat label{font-size:12px;color:var(--text-dark);opacity:0.8; font-weight: 600;}
.progress{height:12px;background:var(--progress-bg);border-radius:8px;overflow:hidden;margin-top:15px;}
.progress-fill{height:100%;background:var(--accent);width:0%;transition:width .5s cubic-bezier(0.4, 0, 0.2, 1);} 

/* REKLAM DÜYMƏSİ STİLİ */
.ad-btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    font-size:15px;
    font-weight:800;
    border:none;
    border-radius:16px;
    color:var(--text-light);
    cursor:pointer;
    transition:0.3s;
    background:linear-gradient(90deg,var(--btn-gradient-start),var(--btn-gradient-end));
    box-shadow:0 8px 20px var(--btn-shadow);
    position: relative; 
    overflow: hidden; 
    z-index: 1; 
}
.ad-btn:hover:not(.waiting){transform:scale(1.02);box-shadow:0 10px 25px var(--btn-shadow);}

.ad-btn.waiting {
    background: #bdc3c7 !important;
    color: #2c3e50 !important;
    cursor: not-allowed;
    box-shadow: none !important;
    position: relative; 
    overflow: hidden; 
}
.ad-btn-content { position: relative; z-index: 2; display: block; }

.timer-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 0%; 
  border-radius: 16px;
  background: linear-gradient(90deg, var(--btn-gradient-start), var(--btn-gradient-end)); 
  z-index: 1; 
}
.ad-btn.waiting .ad-btn-content { color: var(--text-light) !important; }

#msg {
    margin-top: 8px; 
    font-size: 14px;
    font-weight: 700;
    min-height: 0; 
    padding: 0;
    color: #e74c3c;
}

#adRewardNotificationContainer { position: relative; height: 0; overflow: visible; }

.reward-msg {
    position: absolute;
    top: -10px; 
    left: 50%;
    transform: translateX(-50%) translateY(-100%); 
    background: var(--notification-bg); 
    color: var(--notification-text);
    padding: 10px 20px;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    font-weight: 800;
    font-size: 14px;
    opacity: 0;
    z-index: 100; 
    white-space: nowrap;
    transition: opacity 0.4s ease-out, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
}
.reward-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* --- YENİ NAVİQASİYA PANELİ DİZAYNI --- */
.menu{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:350px; 
    display:flex;
    justify-content:space-between;
    background:var(--menu-bg);
    padding:8px; 
    border-radius:24px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
    backdrop-filter:blur(10px);
    z-index: 999;
    border: 1px solid var(--card-border);
}
.menu button{
    flex:1;
    margin:0 4px; 
    padding: 8px 2px;
    border:none;
    border-radius:18px;
    background:transparent;
    color:var(--text-dark);
    cursor: pointer;
    transition:0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60px; 
    opacity: 0.7;
}
.menu button .nav-icon { font-size: 22px; margin-bottom: 4px; line-height: 1; transition: 0.3s;}
.menu button .nav-text { font-size: 11px; font-weight: 800; line-height: 1.2; }

.menu button.active{
    background:linear-gradient(135deg,var(--btn-gradient-start),var(--btn-gradient-end));
    color: var(--text-light);
    box-shadow:0 6px 15px var(--btn-shadow);
    cursor: default; 
    pointer-events: none; 
    opacity: 1;
    transform: translateY(-5px);
}
.menu button:not(.active):hover { opacity: 1; transform: translateY(-2px); }


#form{display:none;margin-top:12px;}
#form input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    border:1px solid var(--card-border);
    background:var(--card-bg);
    color:var(--input-text); 
    font-size: 15px;
    font-weight: 600;
    outline: none;
    transition: border 0.3s;
}
#form input:focus { border-color: var(--accent); }
#form input::placeholder { color: var(--input-text); opacity: 0.5; }
#form button{
    width:100%;padding:14px;margin-top:10px;border:none;border-radius:14px;
    background:linear-gradient(90deg,var(--accent),#2ecc71);
    color:var(--text-light);font-weight:800;font-size: 15px;cursor:pointer; transition: 0.3s;
    box-shadow: 0 6px 15px var(--btn-shadow);
}
#form button:hover { transform: scale(1.02); }
.alert{margin-top:10px;padding:12px;border-radius:12px;display:none; font-weight: 700; text-align: center;}
.alert.error{background:#fadbd8;color:#c0392b;}
.alert.success{background:#d5f5e3;color:#27ae60;}


/* BAŞLANĞIC EKRAN STİLİ - MANAT PAY */
#loadingScreen{
    position:fixed;
    top:0; left:0;width:100%; height:100%;
    background:linear-gradient(135deg, #0f2027, #203a43, #2c5364); 
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity .7s ease;
}
.loader-box{text-align:center;animation:fadeIn .8s ease;position:relative;}
.shine-circle{
    position:absolute;width:250px; height:250px;top:-80px; left:50%;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(46, 204, 113, 0.4), transparent 70%);
    filter:blur(30px);animation:pulse 3s infinite ease-in-out;
}
@keyframes pulse{0%,100%{opacity:.5;}50%{opacity:1;}}
.loader-title{
    font-size:45px;font-weight:900;color:#2ecc71; letter-spacing:2px;
    text-shadow:0 0 15px #27ae60, 0 0 40px rgba(46, 204, 113, 0.8);
    margin-bottom:35px;
}
.loader-bar{
    width:300px;height:12px;border-radius:20px;
    background:rgba(255,255,255,0.1);overflow:hidden;position:relative;
}
.loader-fill{
    height:100%;width:0%;border-radius:20px;
    background:linear-gradient(90deg,#27ae60,#2ecc71); 
    animation:fillAnim 3s forwards cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes fillAnim{from{width:0%;}to{width:100%;}}
.glow{
    position:absolute;top:0; left:0;width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8),transparent);
    animation:shine 1.5s infinite;
}
@keyframes shine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
.loader-text{
    margin-top:18px;font-size:16px;font-weight:700;color:#2ecc71;
    letter-spacing:2px;animation:blink 1.5s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.6;}}

/* TAPŞIRIQ BİLDİRİŞİ ANİMASİYASI */
#taskNotification {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translate(-50%, -100px); 
    background: var(--notification-bg);
    color: var(--notification-text);
    padding: 15px 25px;
    border-radius: 14px;
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    font-weight: 800;
    font-size: 15px;
    opacity: 0;
    z-index: 10000;
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    text-align: center;
    border: 2px solid rgba(255,255,255,0.2);
}
.notification-show {
    opacity: 1 !important;
    transform: translate(-50%, 0) !important; 
}
.notification-hide {
    opacity: 0;
    transform: translate(-50%, -100px); 
}

</style>
</head>
<body id="body">
<div id="loadingScreen">
  <div class="loader-box">
    <div class="shine-circle"></div>
    <div class="loader-title">Manat Pay</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
      <div class="glow"></div>
    </div>
    <div class="loader-text" data-translate-key="loading">Yüklənir...</div>
  </div>
</div>

<div id="taskNotification" class="notification-hide">
    <span id="taskNotificationText"></span>
</div>

<div class="container">
  
  <div class="top-controls">
    <div class="right-controls">
        <button class="theme-toggle-btn" onclick="toggleTheme()">
            <span id="themeIcon" class="theme-icon">🔆</span>
        </button>
        
        <div class="lang-switcher-container">
            <button class="lang-current-btn" onclick="toggleDropdown()">
                <span id="currentLangDisplay">AZ</span>
                <span id="langArrow"></span>
            </button>
            <div class="lang-dropdown" id="langDropdown">
                <button onclick="setLang('az')" id="langAzBtn">AZ</button>
                <button onclick="setLang('en')" id="langEnBtn">EN</button>
                <button onclick="setLang('tr')" id="langTrBtn">TR</button>
                <button onclick="setLang('ru')" id="langRuBtn">RU</button>
            </div>
        </div>
    </div>
  </div>
  
  <div id="adsPage" class="page active">
    <div class="balance-card">
      <h3 data-translate-key="currentBalance">Ümumi Balans</h3>
      <div class="amount"><span id="balance">0.0000</span> <span id="currencySymbol">₼</span></div>
      <div class="usd"><span id="secondaryCurrencySymbol">$</span><span id="secondaryBalance">0.0000</span> <span id="secondaryCurrencyText">USD</span></div>
    </div>
    
    <div id="adRewardNotificationContainer"></div> 
    <div class="ad-card" style="margin-bottom: 20px;"> 
      <h2 data-translate-key="dailyAds">Gündəlik Qazanc</h2>
      <p data-translate-key="adReward">Hər reklama görə <b>0.001 ₼</b> qazanın</p>
      <div class="stats">
        <div class="stat"><span id="adsCount">0</span><label data-translate-key="watched">İzlənən</label></div>
        <div class="stat"><span data-translate-key="maxCount">100</span><label data-translate-key="maximum">Maksimum</label></div>
      </div>
      <div class="progress"><div class="progress-fill" id="progress"></div></div>
      <p style="margin-top:8px; font-weight:700;" data-translate-key="progressText">İrəliləyiş: <span id="progressTextSpan">0/100</span></p>
      <button id="adBtn" class="ad-btn">
        <span class="ad-btn-content" data-translate-key="watchAd">Reklam İzle</span>
      </button>
      <div id="msg"></div> 
    </div>
  </div>
  
  <div id="tasksPage" class="page">
    <div class="task-card">
      <h2 data-translate-key="premiumTask">Premium Görev</h2>
      <p data-translate-key="taskReward1">Kanala qoşul və <b>0.1000 ₼</b> qazan!</p>
      <button id="joinBtn" data-translate-key="joinChannel">Kanala Qoşul</button>
    </div>
  </div>
  
  <div id="walletPage" class="page">
    <div class="balance-card">
      <h3 data-translate-key="withdrawBalance">Çəkilə bilən Balans</h3>
      <div class="amount"><span id="balance2">0.0000</span> <span id="currencySymbol2">₼</span></div>
      <div class="usd"><span id="secondaryCurrencySymbol2">$</span><span id="secondaryBalance2">0.0000</span> <span id="secondaryCurrencyText2">USD</span></div>
    </div>
    <h2 style="text-align:center;margin-bottom:12px;color:var(--text-dark);font-weight:800;" data-translate-key="withdrawTitle">Çıxarış</h2>
    <div class="method-list" id="methods">
      
      <div class="method" data-type="m10">
          <img src="https://i.postimg.cc/Kj94hVNG/unnamed.png" alt="M10 Logo" class="method-logo">
          <span class="method-text">M10</span>
          <span class="min-withdraw-label" data-min-key="m10">4 ₼</span>
      </div>
      <div class="method" data-type="azercell">
          <img src="https://i.postimg.cc/qM5gmPqZ/applogo512.png" alt="Azercell Logo" class="method-logo">
          <span class="method-text">Azercell</span>
          <span class="min-withdraw-label" data-min-key="azercell">4 ₼</span>
      </div>
      <div class="method" data-type="bakcell">
          <img src="https://i.postimg.cc/Pqmx5N49/images.jpg" alt="Bakcell Logo" class="method-logo">
          <span class="method-text">Bakcell</span>
          <span class="min-withdraw-label" data-min-key="bakcell">4 ₼</span>
      </div>
      <div class="method" data-type="nar">
          <img src="https://i.postimg.cc/4NmxhWPy/images.png" alt="Nar Logo" class="method-logo">
          <span class="method-text">Nar</span>
          <span class="min-withdraw-label" data-min-key="nar">4 ₼</span>
      </div>
      <div class="method" data-type="bank">
          <img src="https://i.postimg.cc/L6H0yWwZ/42492-bank-1024.png" alt="Bank Logo" class="method-logo bank-logo">
          <span class="method-text" data-translate-key="bankCard">Bank</span>
          <span class="min-withdraw-label" data-min-key="bank">4 ₼</span>
      </div>
      <div class="method" data-type="usdt">
          <img src="https://i.postimg.cc/X7HxsY98/Tether-USDT-Logo.png" alt="USDT Logo" class="method-logo">
          <span class="method-text">USDT</span>
          <span class="min-withdraw-label" data-min-key="usdt">4 ₼</span>
      </div>
    </div>

    'tr': { main: 'TRY', symbol: '₺', secondary: 'USD', secondarySymbol: '$' },
    'en': { main: 'USD', symbol: '$', secondary: 'RUB', secondarySymbol: '₽' }, 
    'ru': { main: 'RUB', symbol: '₽', secondary: 'USD', secondarySymbol: '$' }
};

function localizeAmount(aznAmount, lang) {
    const rates = EXCHANGE_RATES;
    const currencyInfo = CURRENCIES[lang];
    let amount = aznAmount;
    let format = (val) => val.toFixed(4); 
    
    if (lang === 'tr') { amount = aznAmount * rates.AZN_TO_TRY; format = (val) => val.toFixed(2); } 
    else if (lang === 'en') { amount = aznAmount * rates.AZN_TO_USD; format = (val) => val.toFixed(4); } 
    else if (lang === 'ru') { amount = aznAmount * rates.AZN_TO_RUB; format = (val) => val.toFixed(2); }
    
    return { amount: amount, formatted: format(amount), symbol: currencyInfo.symbol };
}

function getLocalizedReward(lang) {
    const info = localizeAmount(AZN_REWARD, lang);
    return { reward: info.amount, formattedReward: info.formatted, symbol: info.symbol, currency: CURRENCIES[lang].main };
}

function getLocalizedTaskReward(lang, aznReward) {
    const info = localizeAmount(aznReward, lang);
    return `<b>${info.formatted} ${info.symbol}</b>`;
}

function getLocalizedMinAmount(methodType, lang) {
    const currencyInfo = CURRENCIES[lang];
    let symbol = currencyInfo.symbol;
    let formattedAmount;
    if (lang === 'az') { formattedAmount = '4'; symbol = '₼'; } 
    else if (lang === 'en') { formattedAmount = '2.40'; symbol = '$'; } 
    else if (lang === 'tr') { formattedAmount = '100'; symbol = '₺'; } 
    else if (lang === 'ru') { formattedAmount = '188'; symbol = '₽'; } 
    else { formattedAmount = '4'; symbol = '₼'; }
    return `${formattedAmount} ${symbol}`;
}

function getAZNEquivalentMinWithdrawal(lang) {
    if (lang === 'en') return 2.40 / EXCHANGE_RATES.AZN_TO_USD; 
    else if (lang === 'tr') return 100 / EXCHANGE_RATES.AZN_TO_TRY;
    else if (lang === 'ru') return 188 / EXCHANGE_RATES.AZN_TO_RUB;
    else return 4.0; 
}

let currentLang = localStorage.getItem('lang') || 'az';
const LIMIT = 100;

let bal = parseFloat(safeGet(BAL_KEY, -1)); 
// Başlanğıc balans 0.00 olaraq təyin edilir
if (bal === -1 || isNaN(bal)) { 
    bal = 0.00; 
    safeSet(BAL_KEY, bal);
}

let totalAds = parseInt(safeGet(TOTAL_ADS_KEY, 0));
let totalEarned = parseFloat(safeGet(TOTAL_EARNED_KEY, bal)); 
let cnt=parseInt(safeGet(COUNT_KEY,0));
let resetTime=safeGet(RESET_KEY,null);

let tInterval = null; 
let remainingSeconds = 0; 
const MAX_SECONDS = 10;
let rewardMsgTimeout = null; 

// 23:55 AZT-də sıfırlama (UTC ilə 19:55 edir, bütün ölkələr üçün eyni an)
function getNextResetTime(){
  const now = new Date();
  let resetUTC = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 19, 55, 0, 0));
  if(now.getTime() > resetUTC.getTime()){
      resetUTC.setUTCDate(resetUTC.getUTCDate() + 1);
  }
  return resetUTC.getTime();
}

if(!resetTime||Date.now()>resetTime){
  cnt=0;
  resetTime=getNextResetTime();
  safeSet(RESET_KEY,resetTime);
  safeSet(COUNT_KEY,cnt);
}

function update(){
  const lang = currentLang;
  const rates = EXCHANGE_RATES;
  const currencyInfo = CURRENCIES[lang];
  
  let mainBalance = bal;
  let secondaryBalance = bal;
  let mainSymbol = currencyInfo.symbol;
  let secondarySymbol = currencyInfo.secondarySymbol;
  let secondaryText = currencyInfo.secondary;

  let mainFormat = (val) => val.toFixed(4);
  let secondaryFormat = (val) => val.toFixed(4);
  
  if (lang === 'tr') {
      mainBalance = bal * rates.AZN_TO_TRY; secondaryBalance = bal * rates.AZN_TO_USD;
      mainFormat = (val) => val.toFixed(2); secondaryFormat = (val) => val.toFixed(4);
  } else if (lang === 'en') {
      mainBalance = bal * rates.AZN_TO_USD; 
      if (currencyInfo.secondary === 'RUB') { secondaryBalance = bal * rates.AZN_TO_RUB; secondaryFormat = (val) => val.toFixed(2); } 
      else { secondaryBalance = bal; }
      mainFormat = (val) => val.toFixed(4);
  } else if (lang === 'ru') { 
      mainBalance = bal * rates.AZN_TO_RUB; secondaryBalance = bal * rates.AZN_TO_USD;
      mainFormat = (val) => val.toFixed(2); secondaryFormat = (val) => val.toFixed(4);
  } else { 
      mainBalance = bal; secondaryBalance = bal * rates.AZN_TO_USD;
  }
  
  document.getElementById('balance').textContent = mainFormat(mainBalance);
  document.getElementById('balance2').textContent = mainFormat(mainBalance);
  
  document.getElementById('currencySymbol').textContent = mainSymbol;
  document.getElementById('currencySymbol2').textContent = mainSymbol;
  
  document.getElementById('secondaryBalance').textContent = secondaryFormat(secondaryBalance);
  document.getElementById('secondaryBalance2').textContent = secondaryFormat(secondaryBalance);
  
  document.getElementById('secondaryCurrencySymbol').textContent = secondarySymbol;
  document.getElementById('secondaryCurrencySymbol2').textContent = secondarySymbol;
  
  document.getElementById('secondaryCurrencyText').textContent = secondaryText;
  document.getElementById('secondaryCurrencyText2').textContent = secondaryText;

  document.getElementById('adsCount').textContent=cnt;
  document.getElementById('progress').style.width=(cnt/LIMIT*100)+'%';
  const progressTextSpan = document.getElementById('progressTextSpan');
  if(progressTextSpan) progressTextSpan.textContent = `${cnt}/${LIMIT}`;
  
  safeSet(BAL_KEY,bal);
  safeSet(COUNT_KEY,cnt);
  safeSet(TOTAL_ADS_KEY, totalAds); 
  safeSet(TOTAL_EARNED_KEY, totalEarned); 
  
  checkAndDisplayRewardMsg();
}

function updateTaskButtons() {
    const t = TRANSLATIONS[currentLang];
    const btn = document.getElementById('joinBtn');
    if (!btn) return;

    const taskRewardKey = `taskReward1`;
    const localizedRewardText = getLocalizedTaskReward(currentLang, AZN_TASK_REWARD);
    const rewardEl = btn.parentElement.querySelector(`p[data-translate-key="${taskRewardKey}"]`);
    if (rewardEl && t[taskRewardKey]) {
        rewardEl.innerHTML = t[taskRewardKey](localizedRewardText);
    }
    
    if (localStorage.getItem(JOIN_KEY)){
        btn.classList.remove('waiting'); 
        btn.classList.add('completed');
        btn.textContent = t.completed;
        btn.disabled = true; 
    } else {
        if (!btn.classList.contains('waiting')) {
             btn.classList.remove('completed');
             btn.disabled = false;
             btn.textContent = t.joinChannel;
        }
    }
}

function setPlaceholders(methodType) {
    const t = TRANSLATIONS[currentLang];
    const currency = CURRENCIES[currentLang].main;
    const localizedMinAmount = getLocalizedMinAmount(methodType, currentLang); 
    const detailsKey = `placeholderDetails_${methodType}`;
    
    details.placeholder = t[detailsKey] || '';
    const minTextOnly = localizedMinAmount.split(' ')[0]; 
    amount.placeholder = `${t.placeholderAmount} (${currency}) - ${minTextOnly}`; 
}

function applyTranslations(lang) {
    const t = TRANSLATIONS[lang];
    if (!t) return;

    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('currentLangDisplay').textContent = lang.toUpperCase(); 
    document.getElementById('langArrow').textContent = '⬇️'; 

    document.getElementById('langAzBtn').classList.remove('active');
    document.getElementById('langEnBtn').classList.remove('active');
    document.getElementById('langTrBtn').classList.remove('active');
    document.getElementById('langRuBtn')?.classList.remove('active');
    
    const langBtnId = `lang${lang.charAt(0).toUpperCase() + lang.slice(1)}Btn`;
    const activeBtn = document.getElementById(langBtnId);
    if(activeBtn) activeBtn.classList.add('active');

    const rewardInfo = getLocalizedReward(lang);
    
    document.querySelectorAll('[data-translate-key]').forEach(el => {
        const key = el.getAttribute('data-translate-key');
        if (typeof t[key] === 'function') {
             if (key === 'adReward') {
                const formattedRewardText = `<b>${rewardInfo.formattedReward} ${rewardInfo.symbol}</b>`;
                el.innerHTML = t[key](formattedRewardText);
             } else if (key === 'taskReward1') {
                const localizedRewardText = getLocalizedTaskReward(lang, AZN_TASK_REWARD);
                el.innerHTML = t[key](localizedRewardText);
             }
        } else if (t[key]) {
             el.innerHTML = t[key];
        }
    });
    
    updateTaskButtons(); 

    document.querySelectorAll('.min-withdraw-label').forEach(label => {
        const methodType = label.getAttribute('data-min-key');
        if (methodType) label.textContent = getLocalizedMinAmount(methodType, lang); 
    });
    
    const progressTextSpan = document.getElementById('progressTextSpan');
    if(progressTextSpan) progressTextSpan.textContent = `${cnt}/${LIMIT}`;
    
    update(); 
    
    if (document.getElementById('form').style.display === 'block' && type) { setPlaceholders(type); }
    if (tInterval && remainingSeconds > 0) { adBtnContent.textContent = t.wait.replace('{s}', remainingSeconds); } 
    else { if (!adBtn.classList.contains('waiting')) adBtnContent.textContent = t.watchAd; }
}

function toggleDropdown() {
    const dropdown = document.getElementById('langDropdown');
    dropdown.classList.toggle('show');
    document.getElementById('langArrow').textContent = dropdown.classList.contains('show') ? '▲' : '⬇️'; 
}

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('langArrow').textContent = ''; 
    applyTranslations(lang);
    toggleDropdown(); 
}

const adBtn=document.getElementById('adBtn'), msg=document.getElementById('msg');
const adBtnContent = document.querySelector('.ad-btn-content');

function displayRewardMsg(messageHTML) {
    if (rewardMsgTimeout) { clearTimeout(rewardMsgTimeout); rewardMsgTimeout = null; }
    const container = document.getElementById('adRewardNotificationContainer');
    if (!container) return; 

    let rewardMsgElement = document.getElementById('rewardMsg');
    if (rewardMsgElement) { rewardMsgElement.innerHTML = messageHTML; } 
    else {
        rewardMsgElement = document.createElement('div');
        rewardMsgElement.className = 'reward-msg';
        rewardMsgElement.id = 'rewardMsg';
        rewardMsgElement.innerHTML = messageHTML;
        container.appendChild(rewardMsgElement);
    }
    
    rewardMsgElement.classList.remove('show');
    safeSet(REWARD_MSG_KEY, { html: messageHTML, expire: Date.now() + 2000 });

    setTimeout(() => { rewardMsgElement.classList.add('show'); }, 50);
    rewardMsgTimeout = setTimeout(() => {
        if (rewardMsgElement) {
            rewardMsgElement.classList.remove('show');
            setTimeout(() => { if(rewardMsgElement.parentNode === container) rewardMsgElement.remove(); }, 400); 
        }
        safeRemove(REWARD_MSG_KEY);
        rewardMsgTimeout = null;
    }, 2000);
}

function checkAndDisplayRewardMsg() {
    const container = document.getElementById('adRewardNotificationContainer');
    if (!container) return;
    
    const currentPage = document.querySelector('.page.active');
    if (!currentPage || currentPage.id !== 'adsPage') {
        let rewardMsgElement = document.getElementById('rewardMsg');
        if (rewardMsgElement) rewardMsgElement.classList.remove('show');
        return;
    }
    
    const savedMsg = safeGet(REWARD_MSG_KEY, null);
    let rewardMsgElement = document.getElementById('rewardMsg');
    
    if (savedMsg) {
        const remainingTime = savedMsg.expire - Date.now();
        if (remainingTime > 0) {
            if (!rewardMsgElement) {
                rewardMsgElement = document.createElement('div');
                rewardMsgElement.className = 'reward-msg';
                rewardMsgElement.id = 'rewardMsg';
                container.appendChild(rewardMsgElement);
            }
            rewardMsgElement.innerHTML = savedMsg.html;
            rewardMsgElement.classList.remove('show');
            if (rewardMsgTimeout) clearTimeout(rewardMsgTimeout);
            setTimeout(() => { rewardMsgElement.classList.add('show'); }, 50);
            rewardMsgTimeout = setTimeout(() => {
                 if (rewardMsgElement) {
                    rewardMsgElement.classList.remove('show');
                    setTimeout(() => { if(rewardMsgElement.parentNode === container) rewardMsgElement.remove(); }, 400);
                }
                safeRemove(REWARD_MSG_KEY);
                rewardMsgTimeout = null;
            }, remainingTime);
        } else {
            safeRemove(REWARD_MSG_KEY);
            if (rewardMsgElement && rewardMsgElement.parentNode === container) rewardMsgElement.remove();
        }
    } else {
         if (rewardMsgElement && rewardMsgElement.parentNode === container) rewardMsgElement.remove();
    }
}

function restoreAdBtnState() {
    const t = TRANSLATIONS[currentLang];
    
    if (cnt >= LIMIT) {
        adBtn.classList.remove('waiting');
        adBtn.disabled = true;
        adBtnContent.textContent = t.watchAd;
        const timerBar = adBtn.querySelector('.timer-bar');
        if (timerBar) timerBar.remove();
        msg.textContent = t.adLimitReached;
        checkAndDisplayRewardMsg();
        return; 
    }
    
    if (tInterval && remainingSeconds > 0) {
        adBtn.disabled = true;
        adBtn.classList.add('waiting');
        let timerBar = adBtn.querySelector('.timer-bar');
        if (!timerBar) {
            timerBar = document.createElement('div');
            timerBar.className = 'timer-bar';
            adBtn.prepend(timerBar);
        }
        const elapsed = MAX_SECONDS - remainingSeconds;
        const startPercentage = (elapsed / MAX_SECONDS) * 100;
        timerBar.style.transition = 'none'; 
        timerBar.style.width = `${startPercentage}%`; 
        setTimeout(() => {
            timerBar.style.transition = `width ${remainingSeconds}s linear`;
            timerBar.style.width = '100%'; 
        }, 50); 
        adBtnContent.textContent = t.wait.replace('{s}', remainingSeconds);
        msg.textContent = '';
    } else {
        adBtn.classList.remove('waiting');
        adBtn.disabled = false;
        adBtnContent.textContent = t.watchAd;
        const timerBar = adBtn.querySelector('.timer-bar');
        if (timerBar) timerBar.remove();
        msg.textContent = '';
    }
    checkAndDisplayRewardMsg();
}

adBtn.onclick=()=>{
  const t = TRANSLATIONS[currentLang];
  
  if(cnt>=LIMIT){ msg.textContent=t.adLimitReached; return; }
  if (tInterval) return;

  if (rewardMsgTimeout) { clearTimeout(rewardMsgTimeout); rewardMsgTimeout = null; }
  safeRemove(REWARD_MSG_KEY);
  let rewardMsgElement = document.getElementById('rewardMsg');
  if (rewardMsgElement) {
       rewardMsgElement.classList.remove('show');
       setTimeout(() => {
           const container = document.getElementById('adRewardNotificationContainer');
           if(container && rewardMsgElement.parentNode === container) rewardMsgElement.remove();
       }, 400); 
  }
  
  adBtn.disabled=true; 
  adBtn.classList.add('waiting');
  remainingSeconds = MAX_SECONDS; 
  
  let timerBar = adBtn.querySelector('.timer-bar');
  if (!timerBar) {
      timerBar = document.createElement('div');
      timerBar.className = 'timer-bar';
      adBtn.prepend(timerBar); 
  }
  
  timerBar.style.transition = 'none';
  timerBar.style.width = '0%';
  setTimeout(() => {
    timerBar.style.transition = `width ${MAX_SECONDS}s linear`; 
    timerBar.style.width = '100%';
  }, 50); 
  
  adBtnContent.textContent = t.wait.replace('{s}', remainingSeconds); 
  msg.textContent = '';
  
  // YENİ SDK ÇAĞIRIŞI 
  try{if(typeof show_10701408==='function'){show_10701408();}}catch(e){} 
  
  tInterval=setInterval(()=>{
    remainingSeconds--;
    const currentT = TRANSLATIONS[currentLang];
    
    if (adBtnContent) adBtnContent.textContent = currentT.wait.replace('{s}', remainingSeconds > 0 ? remainingSeconds : '0'); 
    
    if(remainingSeconds === 0){
        clearInterval(tInterval);
        tInterval = null;
        
        bal+=AZN_REWARD; 
        totalEarned += AZN_REWARD; 
        cnt++; totalAds++; 
        update(); 
        
        const currentRewardInfo = getLocalizedReward(currentLang);
        const formattedRewardText = `<b>${currentRewardInfo.formattedReward} ${currentRewardInfo.symbol}</b>`;
        
        displayRewardMsg(currentT.rewardAddedConfirmed(formattedRewardText));
        
        if (timerBar) { timerBar.style.transition = 'none'; timerBar.remove(); }
        
        adBtn.disabled=false;
        adBtn.classList.remove('waiting');
        
        if (adBtnContent) adBtnContent.textContent = currentT.watchAd; 
        if (cnt >= LIMIT) msg.textContent = currentT.adLimitReached;
        else msg.textContent = ''; 
    }
  },1000);
};

const taskNotification = document.getElementById('taskNotification');
const taskNotificationText = document.getElementById('taskNotificationText');

function showTaskNotification(message) {
    taskNotificationText.innerHTML = message;
    taskNotification.classList.remove('notification-hide');
    taskNotification.classList.add('notification-show');
    setTimeout(() => {
        taskNotification.classList.remove('notification-show');
        taskNotification.classList.add('notification-hide');
    }, 3000);
}

// Bircə ədəd tapşırıq sistemi - Link gizli şəkildə işləyir
const joinBtn = document.getElementById('joinBtn');
if (joinBtn) {
    joinBtn.onclick = () => {
        if (localStorage.getItem(JOIN_KEY) || joinBtn.disabled) return; 
        
        const t = TRANSLATIONS[currentLang];
        window.open('https://t.me/manat_pay', '_blank'); // Kanala yönləndirir
        
        joinBtn.disabled = true;
        joinBtn.classList.add('waiting'); 
        joinBtn.textContent = t.wait.replace('{s}', '3');
        
        setTimeout(() => {
            bal += AZN_TASK_REWARD; 
            totalEarned += AZN_TASK_REWARD; 
            safeSet(BAL_KEY, bal);
            safeSet(TOTAL_EARNED_KEY, totalEarned);
            localStorage.setItem(JOIN_KEY, '1'); // Gözləmə kilidi
            
            update();
            
            joinBtn.classList.remove('waiting');
            joinBtn.classList.add('completed');
            joinBtn.textContent = t.completed;
            joinBtn.disabled = true;
            
            const localizedRewardText = getLocalizedTaskReward(currentLang, AZN_TASK_REWARD);
            showTaskNotification(t.taskSuccess(localizedRewardText));
        }, 3000); 
    };
}

function showPage(id, btn){
  if (btn.classList.contains('active')) return; 

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  if (id === 'adsPage') { restoreAdBtnState(); } 
  else if (id === 'tasksPage') { updateTaskButtons(); } 
  else {
    let rewardMsgElement = document.getElementById('rewardMsg');
    if (rewardMsgElement) rewardMsgElement.classList.remove('show');
  }
}

const methods = document.querySelectorAll('.method');
const form = document.getElementById('form');
const details = document.getElementById('details');
const amount = document.getElementById('amount');
const alertBox = document.getElementById('alert');
let type = '';

methods.forEach(m=>{
  m.onclick=()=>{
    type=m.dataset.type;
    document.getElementById('methods').style.display='none';
    form.style.display='block';
    setPlaceholders(type);
    details.value=''; amount.value='';
    alertBox.style.display='none';
  };
});

document.getElementById('backBtn').onclick=()=>{
  form.style.display='none';
  document.getElementById('methods').style.display='flex';
  alertBox.style.display='none';
  type='';
};

document.getElementById('withdrawBtn').onclick=()=>{
  const det = details.value.trim();
  const amt = parseFloat(amount.value);
  alertBox.style.display='none';
  const t = TRANSLATIONS[currentLang];

  if(!type){ showErr(t.methodError); return; }
  if(!det){ showErr(t.detailsError); return; }
  if(isNaN(amt) || amt <= 0){ showErr(t.amountError); return; }
  
  let minAmount = 0; let currentBalanceInLang = bal; 
  if (currentLang === 'tr') { currentBalanceInLang = bal * EXCHANGE_RATES.AZN_TO_TRY; minAmount = 100; } 
  else if (currentLang === 'en') { currentBalanceInLang = bal * EXCHANGE_RATES.AZN_TO_USD; minAmount = 2.40; } 
  else if (currentLang === 'ru') { currentBalanceInLang = bal * EXCHANGE_RATES.AZN_TO_RUB; minAmount = 188; } 
  else { currentBalanceInLang = bal; minAmount = 4; }
  
  const EPSILON = 0.0001; 
  if(amt < minAmount - EPSILON){ showErr(t.minAmount(getLocalizedMinAmount(type, currentLang))); return; }
  if(amt > currentBalanceInLang + EPSILON){ showErr(t.balanceError); return; }

  let withdrawalAmountInAZN = 0;
  if (currentLang === 'tr') withdrawalAmountInAZN = amt / EXCHANGE_RATES.AZN_TO_TRY;
  else if (currentLang === 'en') withdrawalAmountInAZN = amt / EXCHANGE_RATES.AZN_TO_USD;
  else if (currentLang === 'ru') withdrawalAmountInAZN = amt / EXCHANGE_RATES.AZN_TO_RUB;
  else withdrawalAmountInAZN = amt; 

  bal -= withdrawalAmountInAZN; 
  safeSet(BAL_KEY,bal);
  update();

  alertBox.textContent=t.withdrawSuccess;
  alertBox.className='alert success';
  alertBox.style.display='block';

  setTimeout(()=>{
    form.style.display='none';
    document.getElementById('methods').style.display='flex';
    alertBox.style.display='none';
    type='';
  }, 2000);
};

function showErr(msg){
  alertBox.textContent=msg;
  alertBox.className='alert error';
  alertBox.style.display='block';
}

update();
applyTranslations(currentLang); 
restoreAdBtnState();

setTimeout(()=>{
  const s=document.getElementById("loadingScreen");
  s.style.opacity="0";
  setTimeout(()=>s.style.display="none",700);
},3000);
</script>
